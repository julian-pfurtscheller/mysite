{% extends 'main/base.html' %}

{% block title %}Create Post{% endblock %}

{% block content %}
    <h2>Create a New Post</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Post</button>
    </form>

    <p><a href="{% url 'posts' %}">← Back to posts</a></p>
{% endblock %}
