{% extends 'main/base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <article class="post">
        <h2>{{ post.title }}</h2>

        {% if post.image %}
            <img src="{{ post.image.url }}" alt="{{ post.title }}" class="post-image">
        {% endif %}

        <p>{{ post.content }}</p>
        <small>Created: {{ post.created_at }}</small>
    </article>

    <p><a href="{% url 'posts' %}">← Back to all posts</a></p>
{% endblock %}
